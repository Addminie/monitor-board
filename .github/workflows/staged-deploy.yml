name: staged-deploy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Deploy stage"
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        description: "Git ref to deploy (branch/tag/SHA)"
        required: false
        default: "main"
      compose_file:
        description: "Compose file path on remote host"
        required: false
        default: "docker-compose.monitoring.yml"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.stage }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.stage }}
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Validate deploy secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

      - name: Run staged deployment via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all --prune
            git checkout "${{ inputs.ref }}"
            git pull --ff-only
            docker compose -f "${{ inputs.compose_file }}" pull
            docker compose -f "${{ inputs.compose_file }}" up -d --remove-orphans
            docker compose -f "${{ inputs.compose_file }}" ps
