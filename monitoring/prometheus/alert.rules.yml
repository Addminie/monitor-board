groups:
  - name: monitor-board-recordings
    interval: 30s
    rules:
      - record: monitor:cpu_usage_percent:avg
        expr: avg by (job, target, env, business, room, owner) (monitor_cpu_usage_percent{job="monitor-agent"})
      - record: monitor:memory_usage_percent:avg
        expr: avg by (job, target, env, business, room, owner) (monitor_memory_usage_percent{job="monitor-agent"})
      - record: monitor:disk_usage_percent:max
        expr: max by (job, target, env, business, room, owner) (monitor_disk_usage_percent{job="monitor-agent"})
      - record: monitor:network_throughput_bytes_per_second:sum
        expr: sum by (job, target, env, business, room, owner) (monitor_network_rx_bytes_per_second{job="monitor-agent"} + monitor_network_tx_bytes_per_second{job="monitor-agent"})
      - record: monitor:service_failed_total:max
        expr: max by (job, target, env, business, room, owner) (monitor_service_failed_total{job="monitor-agent"})

  - name: monitor-board-alerts
    interval: 15s
    rules:
      - alert: TargetOffline
        expr: up{job="monitor-agent"} == 0
        for: 45s
        labels:
          severity: offline
          source: monitor-board
        annotations:
          summary: "Target offline: {{ $labels.target }}"
          description: "Prometheus cannot scrape {{ $labels.target }} ({{ $labels.instance }}) /metrics."

      - alert: HostHighCPUWarning
        expr: monitor:cpu_usage_percent:avg >= 85
        for: 2m
        labels:
          severity: warn
          source: monitor-board
        annotations:
          summary: "CPU warning: {{ $labels.target }}"
          description: "CPU usage {{ $value | printf \"%.1f\" }}% >= 85%."

      - alert: HostHighCPUDanger
        expr: monitor:cpu_usage_percent:avg >= 95
        for: 1m
        labels:
          severity: danger
          source: monitor-board
        annotations:
          summary: "CPU danger: {{ $labels.target }}"
          description: "CPU usage {{ $value | printf \"%.1f\" }}% >= 95%."

      - alert: HostHighMemoryWarning
        expr: monitor:memory_usage_percent:avg >= 85
        for: 2m
        labels:
          severity: warn
          source: monitor-board
        annotations:
          summary: "Memory warning: {{ $labels.target }}"
          description: "Memory usage {{ $value | printf \"%.1f\" }}% >= 85%."

      - alert: HostHighMemoryDanger
        expr: monitor:memory_usage_percent:avg >= 95
        for: 1m
        labels:
          severity: danger
          source: monitor-board
        annotations:
          summary: "Memory danger: {{ $labels.target }}"
          description: "Memory usage {{ $value | printf \"%.1f\" }}% >= 95%."

      - alert: HostHighDiskWarning
        expr: monitor:disk_usage_percent:max >= 80
        for: 3m
        labels:
          severity: warn
          source: monitor-board
        annotations:
          summary: "Disk warning: {{ $labels.target }}"
          description: "Disk max usage {{ $value | printf \"%.1f\" }}% >= 80%."

      - alert: HostHighDiskDanger
        expr: monitor:disk_usage_percent:max >= 90
        for: 2m
        labels:
          severity: danger
          source: monitor-board
        annotations:
          summary: "Disk danger: {{ $labels.target }}"
          description: "Disk max usage {{ $value | printf \"%.1f\" }}% >= 90%."

      - alert: HostServiceFailure
        expr: monitor:service_failed_total:max >= 1
        for: 90s
        labels:
          severity: danger
          source: monitor-board
        annotations:
          summary: "Service failure: {{ $labels.target }}"
          description: "Failed service count {{ $value | printf \"%.0f\" }} >= 1."
