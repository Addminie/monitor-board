global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: monitor-agent
    metrics_path: /metrics
    static_configs:
      - targets:
          - agent-local:9101
        labels:
          target: local-agent
          env: local
